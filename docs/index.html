<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>3D data visualization Demo</title>
    <link rel="stylesheet" type="text/css" href="css/sanddance-app.css">
    <link rel="stylesheet" type="text/css" href="css/sanddance-app-site.css">
</head>

<body>
    <!-- link to JSON files so we can get a url from the bundler -->
    <!-- Do not use the React Version of this app -->

    <a class="sanddance-app-static-content" id="titanic" data-display-name="Titanic" data-type="tsv"
        href="sample-data/titanicmaster.tsv"></a>
    <a class="sanddance-app-static-content" id="x_y_z" data-display-name="x_y_z" data-type="csv"
        href="sample-data/clean_x_y_z.csv"></a>
    <a class="sanddance-app-static-content" id="blank" data-display-name="blank" data-type="csv"
        href="sample-data/blank.csv"></a>

    <script>
        function setTheme(darkTheme) {
            localStorage.setItem('theme', darkTheme ? 'Dark' : 'Light');
        }
        var darkTheme = localStorage.getItem('theme') === 'Dark';
        var insights = {
            "titanic": {
                "columns": {
                    "uid": "Name",
                    "x": "Gender",
                    "y": "Joined",
                    "color": "Survived",
                    "z": "TicketCost",
                    "sort": "Survived"
                },
                "scheme": "dual_redgreen",
                "chart": "barchart",
                "view": "2d"
            }
        };
        var options = {
            "*": {
                "chartPrefs": {
                    "*": {
                        "*": {
                            "*": {
                                "signalValues": {
                                    "RoleColor_BinCountSignal": 7
                                }
                            }
                        }
                    }
                }
            },
            "titanic": {
                "chartPrefs": {
                    "barchart": {
                        "color": {
                            "Gender": {
                                "scheme": "set2"
                            }
                        }
                    }
                }
            }
        };
    </script>

    <main id="app"></main>

    <script src="external/js/react.development.js" crossorigin=""></script>
    <script src="external/js/react-dom.development.js" crossorigin=""></script>
<!--     <script src="js/sanddance-app.js"></script> -->
    <script src="js/sanddance-app-v2.js"></script>

</body>

</html>
