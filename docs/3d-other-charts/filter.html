<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Dynamic Data Visualization</title>
	<!-- Load plotly.js into the DOM -->
	<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
	<script src='https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js'></script>
</head>
<style>
* {
  font-family: Arial;
}
html {
  min-width: 1280px;
  margin: 0px;
  padding: 0px;
}
body {
  margin: 0px;
  padding: 0px;
}
button {
    background: #33333333;
    border: none;
    margin: 10px;
    display: inline;  
}
#dropdown, #showDropdown {
    float: left;
    height: 20px;
    z-index: 99999;
    margin: 0px 10px;
    position: absolute;
    top: 80px;
}
label {
    font-size: 12px;
    margin-right:4px;
}
#select {
    min-width: 100px;
}
#showDropdown {
  left: 200px;
}
input#uploader {
  position: absolute;
  top: 0px;
  margin: 10px;
}
#hints {
    top: 100px;
    display: block;
    color: #999;
    background: #dfdfdf;
    position: absolute;
}
#hints span {
  margin: 10px;
  color: red;
}
#hints p {
  margin: 10px;
}
#stats {
    display: flex;
    top: 30px;
    margin: 10px;
    position: absolute;
}
#stats div {
    display: flex;
    font-family: arial;
    font-size: 12px;
    margin-right: 10px;
}
#es {
    float: left;
    height: 20px;
    z-index: 99999;
    margin: 0px 10px;
    position: absolute;
    top: 0px;
    left: 280px;
    width: 1000px;
}
#es input {
  max-width: 200px;
  border: 1px #999 solid;
}
</style>
<body>
  <div id="user-input">
  	<div id='myDiv'><!-- Plotly chart will be drawn inside this DIV --></div>
  <script  src="./script-filter.js"></script>
  <input type="file" id="uploader">
  <div id="stats">
  </div>
  <div id="hints">
  </div>
</div>
<script>
upload_button("uploader", load_dataset);
</script>
</body>
</html>
